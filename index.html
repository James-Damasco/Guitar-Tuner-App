<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="Professional Guitar Tuner — real-time pitch detection, metronome, chord library" />
  <title>StringSync — Professional Tuner</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ══════════════ HEADER ══════════════ -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 2C8.268 2 2 8.268 2 16s6.268 14 14 14 14-6.268 14-14S23.732 2 16 2z" stroke="var(--accent)" stroke-width="1.5"/>
          <path d="M16 8v8l5 3" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
          <circle cx="16" cy="16" r="2" fill="var(--accent)"/>
        </svg>
        <span class="logo-text">StringSync</span>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" title="Toggle dark/light mode">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ══════════════ SETTINGS PANEL ══════════════ -->
  <aside class="settings-panel" id="settingsPanel" aria-hidden="true">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="icon-btn" id="closeSettings">✕</button>
    </div>
    <div class="settings-body">

      <section class="settings-section">
        <h3>Instrument</h3>
        <div class="button-group" id="instrumentGroup">
          <button class="group-btn active" data-instrument="guitar">Guitar</button>
          <button class="group-btn" data-instrument="bass">Bass</button>
          <button class="group-btn" data-instrument="ukulele">Ukulele</button>
        </div>
      </section>

      <section class="settings-section">
        <h3>Tuning</h3>
        <select id="tuningSelect" class="styled-select">
          <option value="standard">Standard (EADGBe)</option>
          <option value="dropD">Drop D (DADGBe)</option>
          <option value="openG">Open G (DGDGBd)</option>
          <option value="halfDown">Half-step Down (Eb Ab Db Gb Bb eb)</option>
          <option value="custom">Custom...</option>
        </select>
        <div id="customTuningInputs" class="custom-tuning hidden">
          <label>Custom Notes (low→high, comma separated)</label>
          <input type="text" id="customTuningInput" class="styled-input" placeholder="E2,A2,D3,G3,B3,E4" />
          <button class="btn-sm" id="applyCustomTuning">Apply</button>
        </div>
      </section>

      <section class="settings-section">
        <h3>Reference Pitch</h3>
        <div class="range-row">
          <span>A4 =</span>
          <input type="range" id="a4Slider" min="430" max="448" value="440" class="styled-range" />
          <span id="a4Value" class="range-val">440 Hz</span>
        </div>
      </section>

      <section class="settings-section">
        <h3>Tuner Mode</h3>
        <div class="button-group" id="modeGroup">
          <button class="group-btn active" data-mode="auto">Auto String</button>
          <button class="group-btn" data-mode="chromatic">Chromatic</button>
          <button class="group-btn" data-mode="manual">Manual</button>
        </div>
      </section>

    </div>
  </aside>
  <div class="settings-overlay hidden" id="settingsOverlay"></div>

  <!-- ══════════════ MAIN APP ══════════════ -->
  <main class="app-main">

    <!-- TAB NAV -->
    <nav class="tab-nav" role="tablist">
      <button class="tab-btn active" data-tab="tuner" role="tab" aria-selected="true">Tuner</button>
      <button class="tab-btn" data-tab="metronome" role="tab" aria-selected="false">Metronome</button>
      <button class="tab-btn" data-tab="chords" role="tab" aria-selected="false">Chords</button>
    </nav>

    <!-- ─── TUNER TAB ─── -->
    <section class="tab-content active" id="tab-tuner" role="tabpanel">

      <!-- MIC CONTROLS -->
      <div class="mic-bar">
        <button class="mic-btn" id="micBtn" aria-label="Toggle microphone">
          <span class="mic-icon">
            <svg id="micOnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
              <path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
            </svg>
            <svg id="micOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden">
              <line x1="1" y1="1" x2="23" y2="23"/>
              <path d="M9 9v3a3 3 0 005.12 2.12M15 9.34V4a3 3 0 00-5.94-.6"/>
              <path d="M17 16.95A7 7 0 015 12v-2m14 0v2a7 7 0 01-.11 1.23M12 19v4M8 23h8"/>
            </svg>
          </span>
          <span id="micLabel">Start Tuning</span>
        </button>
        <div class="mic-status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Microphone off</span>
        </div>
        <div class="signal-bar" id="signalBar">
          <div class="signal-fill" id="signalFill"></div>
        </div>
      </div>

      <!-- STRING SELECTOR -->
      <div class="string-selector" id="stringSelector">
        <!-- populated by JS -->
      </div>

      <!-- MAIN TUNER DISPLAY -->
      <div class="tuner-display">

        <!-- NOTE BIG DISPLAY -->
        <div class="note-display">
          <div class="note-name" id="noteName">—</div>
          <div class="note-octave" id="noteOctave"></div>
          <div class="note-freq" id="noteFreq">— Hz</div>
        </div>

        <!-- NEEDLE METER -->
        <div class="meter-wrap">
          <canvas id="meterCanvas" width="600" height="220" aria-label="Tuning meter"></canvas>
          <div class="cents-display">
            <span id="centsValue">— ¢</span>
            <span class="cents-label" id="tuneStatus">—</span>
          </div>
        </div>

        <!-- ACCURACY INDICATOR -->
        <div class="accuracy-bar">
          <div class="accuracy-fill" id="accuracyFill"></div>
          <span class="accuracy-label" id="accuracyLabel">—</span>
        </div>

      </div>

      <!-- REFERENCE TONE -->
      <div class="ref-tone-section">
        <h3 class="section-title">Reference Tone</h3>
        <div class="ref-tone-grid" id="refToneGrid">
          <!-- populated by JS -->
        </div>
        <div class="ref-controls">
          <label>Waveform:</label>
          <div class="button-group" id="waveformGroup">
            <button class="group-btn active" data-wave="sine">Sine</button>
            <button class="group-btn" data-wave="triangle">Triangle</button>
            <button class="group-btn" data-wave="sawtooth">Sawtooth</button>
          </div>
          <label style="margin-left:1rem;">Volume:</label>
          <input type="range" id="toneVolume" min="0" max="1" step="0.01" value="0.5" class="styled-range" style="width:80px"/>
        </div>
      </div>

    </section>

    <!-- ─── METRONOME TAB ─── -->
    <section class="tab-content" id="tab-metronome" role="tabpanel">
      <div class="metro-container">

        <div class="bpm-display">
          <div class="bpm-number" id="bpmDisplay">120</div>
          <div class="bpm-label">BPM</div>
        </div>

        <div class="beat-visual" id="beatVisual">
          <div class="beat-dot" id="beatDot"></div>
          <div class="beat-arc" id="beatArc"></div>
        </div>

        <div class="beat-indicators" id="beatIndicators">
          <!-- populated by JS -->
        </div>

        <div class="bpm-controls">
          <button class="bpm-step" id="bpmDown" aria-label="Decrease BPM">−</button>
          <input type="range" id="bpmSlider" min="30" max="240" value="120" class="styled-range bpm-range" />
          <button class="bpm-step" id="bpmUp" aria-label="Increase BPM">+</button>
        </div>

        <div class="metro-row">
          <div class="time-sig-group">
            <label>Time Signature</label>
            <select id="timeSigSelect" class="styled-select sm">
              <option value="4">4/4</option>
              <option value="3">3/4</option>
              <option value="6">6/8</option>
              <option value="2">2/4</option>
            </select>
          </div>
          <button class="tap-btn" id="tapBtn">TAP</button>
        </div>

        <div class="metro-row">
          <button class="metro-start-btn" id="metroStartBtn">
            <svg id="metroPlayIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="metroStopIcon" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            <span id="metroLabel">Start</span>
          </button>
        </div>

      </div>
    </section>

    <!-- ─── CHORDS TAB ─── -->
    <section class="tab-content" id="tab-chords" role="tabpanel">
      <div class="chords-container">

        <div class="chord-search-row">
          <input type="text" id="chordSearch" class="styled-input" placeholder="Search chord (e.g. Am, G7, Cmaj7)..." />
          <div class="chord-filter-group" id="chordFilterGroup">
            <button class="group-btn active" data-filter="major">Major</button>
            <button class="group-btn" data-filter="minor">Minor</button>
            <button class="group-btn" data-filter="dom7">Dom 7</button>
            <button class="group-btn" data-filter="maj7">Maj 7</button>
            <button class="group-btn" data-filter="sus">Sus</button>
          </div>
        </div>

        <div class="chord-grid" id="chordGrid">
          <!-- populated by JS -->
        </div>

      </div>
    </section>

  </main>

  <!-- ══════════════ SCRIPTS ══════════════ -->
  <script type="module" src="main.js"></script>
</body>
</html>
